<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Knekro Fishing</title>
<style>
html, body{
    margin:0;
    padding:0;
    background:#000;
}

#fakePage img{
    display:block;
    width:100vw;
    height:auto;
}

#overlay{
    position:fixed;
    inset:0;
    background:black;
    display:none;
    z-index:9999;
}

#overlay video{
    width:100%;
    height:100%;
    object-fit:contain;
}

#closeBtn{
    position:absolute;
    top:15px;
    right:15px;
    z-index:10000;
    padding:10px 14px;
    cursor:pointer;
    font-size:16px;
}
</style>
</head>
<body>

<div id="fakePage">
    <img src="steam-screenshot.png" alt="Steam">
</div>

<div id="overlay">
    <button id="closeBtn">Cierra loquete</button>
    <video id="jumpVideo" preload="auto" muted>
			<source src="jumpscare.mp4" type="video/mp4">
		</video>
</div>

<script>
const overlay = document.getElementById('overlay');
const video = document.getElementById('jumpVideo');

let triggered = false;

function launchJumpscare() {
    if (triggered) return;

    triggered = true;

    overlay.style.display = 'block';

    video.currentTime = 0;

    video.muted = false;

    video.play();

    window.removeEventListener('wheel', launchJumpscare);
    window.removeEventListener('touchmove', launchJumpscare);
}

window.addEventListener('wheel', launchJumpscare, { passive: true });
window.addEventListener('touchmove', launchJumpscare, { passive: true });

document.getElementById('closeBtn').addEventListener('click', () => {
    video.pause();
    video.currentTime = 0;
    overlay.style.display = 'none';
});
</script>


</body>
</html>
